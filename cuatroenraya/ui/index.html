<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuatro en Raya</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body>
    <header>
        <h1>INSERTAR TITULO AQUI</h1>
        
        <nav class="pestanas">
            <button class="pestana activa" onclick="cambiarPestana('PLANTS', this)">PLANTS</button>
            <button class="pestana " onclick="cambiarPestana('DATA', this)">DATA</button>
        </nav>
    </header>

    <main>
        <section id="PLANTS" class="contenido-pestana activa">
            <h2>insertar titulo plants</h2>
            <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Voluptas, voluptate.</p>
        </section>

        <section id="DATA" class="contenido-pestana ">
            <h2 id="estado-conexion">Desconectado</h2>
            <div class="panel-data-Temperatura">
                
                <div class="contenedor-grafica">
                     <canvas id="graficaTemperatura"></canvas>
                </div>

                <div class="mustreo-actual">
                    <h3>DATO ACTUAL</h3>
                    <div class="valor-gigante">
                        <span id="temp-actual-display">--</span><span class="unidad">°C</span>
                    </div>
                </div>

            </div>

            <div class="panel-data-Humedad">
                
                <div class="contenedor-grafica">
                     <canvas id="graficaHumedad"></canvas>
                </div>

                <div class="display-actual">
                    <h3>DATO ACTUAL</h3>
                    <div class="valor-gigante">
                        <span id="humedad-actual-display">--</span><span class="unidad">%</span>
                    </div>
                </div>

            </div>
            </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
